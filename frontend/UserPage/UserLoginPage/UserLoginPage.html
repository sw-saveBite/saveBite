<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사용자 로그인 | 가게 예약 서비스</title>
<link rel="stylesheet" href="UserLoginPage.css">
</head>
<body>
<div class="page">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </div>
  <h1>사용자 로그인</h1>
  <p class="subtitle">주변 가게를 탐색하고 예약하세요</p>

  <div class="card">
    <div class="top-banner" id="topBanner"></div>

    <div class="field">
      <label for="email">이메일</label>
      <div class="input-wrap" id="emailWrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>
        <input type="text" id="email" placeholder="user@email.com" autocomplete="off">
      </div>
      <div class="msg" id="emailMsg"></div>
    </div>

    <div class="field">
      <label for="password">비밀번호</label>
      <div class="input-wrap" id="pwWrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
        <button type="button" class="eye-btn" id="pwEye" aria-label="비밀번호 표시">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="msg" id="pwMsg"></div>
    </div>

    <button type="button" class="main-btn" id="loginBtn">로그인</button>

    <div class="bottom-link">
      계정이 없으신가요?
      <a href="../UserSigninPage/UserSigninPage.html">회원가입</a>
    </div>

    <hr class="divider">
    <a href="../../AdminPage/AdminLoginPage/AdminLoginPage.html" class="admin-link">관리자 페이지로 이동 →</a>
  </div>
</div>

<script src="../config.js"></script>
<script src="UserLoginPage.js"></script>
</body>
</html>
